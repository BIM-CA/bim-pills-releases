<!doctype html>
<html lang="es">
<head>

<link rel="stylesheet" href="assets/colors_and_type.css" />
<style>
  @font-face {
    font-family: "Montserrat";

  }
  @font-face {

    font-weight: 800; font-style: normal; font-display: block;
  }
  html, body {
    margin: 0; padding: 0;
    font-family: "Montserrat", sans-serif;
    background: #FBFAF8;
    width: 1080px; height: 1080px; overflow: hidden;
  }
  #root { width: 1080px; height: 1080px; position: absolute; top: 0; left: 0; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const C = {
  negro: "#212B37",
  naranja: "#ED6441",
  amarillo: "#FECA28",
  crema: "#FBFAF8",
  blanco: "#FFFFFF",
  hair: "rgba(32,43,55,0.12)",
  soft: "rgba(32,43,55,0.22)",
  ink2: "rgba(32,43,55,0.55)"
};

function CadGrid({ size = 24, stroke = "rgba(32,43,55,0.08)", dots = true, style }) {
  const bg = dots ?
    `radial-gradient(circle, ${stroke} 1px, transparent 1px)` :
    `linear-gradient(${stroke} 1px, transparent 1px), linear-gradient(90deg, ${stroke} 1px, transparent 1px)`;
  return (
    <div style={{ position: "absolute", inset: 0, backgroundImage: bg, backgroundSize: `${size}px ${size}px`, backgroundPosition: "0 0", ...style }} />
  );
}

function TopoBackground({ stroke = "rgba(32,43,55,0.28)", weak = "rgba(32,43,55,0.07)", accent = "#ED6441", children }) {
  const { lines, peaks } = React.useMemo(() => {
    const W = 1080, H = 1080;
    const cellSize = 16;
    const cols = Math.ceil(W / cellSize) + 1;
    const rows = Math.ceil(H / cellSize) + 1;
    const peaksDef = [
      { x: 220, y: 340, h: 2.6, s: 240 },
      { x: 820, y: 700, h: 2.9, s: 280 },
      { x: 640, y: 180, h: 1.6, s: 200 },
      { x: 340, y: 860, h: 1.4, s: 220 },
      { x: 540, y: 540, h: 0.9, s: 360 },
      { x: 780, y: 320, h: -1.1, s: 180 },
      { x: 180, y: 620, h: -0.8, s: 200 }
    ];
    const field = new Float32Array(cols * rows);
    let hmin = Infinity, hmax = -Infinity;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const x = c * cellSize, y = r * cellSize;
        let h = 0;
        for (const p of peaksDef) {
          const dx = x - p.x, dy = y - p.y;
          h += p.h * Math.exp(-(dx * dx + dy * dy) / (2 * p.s * p.s));
        }
        field[r * cols + c] = h;
        if (h < hmin) hmin = h;
        if (h > hmax) hmax = h;
      }
    }
    const N = 22;
    const isoValues = [];
    for (let i = 1; i < N; i++) isoValues.push(hmin + (hmax - hmin) * i / N);
    const interp = (_a, _b, va, vb, iso) => (iso - va) / (vb - va);
    const lines = isoValues.map((iso, idx) => {
      const segs = [];
      for (let r = 0; r < rows - 1; r++) {
        for (let c = 0; c < cols - 1; c++) {
          const v0 = field[r * cols + c];
          const v1 = field[r * cols + c + 1];
          const v2 = field[(r + 1) * cols + c + 1];
          const v3 = field[(r + 1) * cols + c];
          let code = 0;
          if (v0 > iso) code |= 1;
          if (v1 > iso) code |= 2;
          if (v2 > iso) code |= 4;
          if (v3 > iso) code |= 8;
          if (code === 0 || code === 15) continue;
          const x0 = c * cellSize, y0 = r * cellSize;
          const x1 = x0 + cellSize, y1 = y0 + cellSize;
          const eTop = () => [x0 + cellSize * interp(null, null, v0, v1, iso), y0];
          const eRight = () => [x1, y0 + cellSize * interp(null, null, v1, v2, iso)];
          const eBottom = () => [x0 + cellSize * interp(null, null, v3, v2, iso), y1];
          const eLeft = () => [x0, y0 + cellSize * interp(null, null, v0, v3, iso)];
          let pairs;
          switch (code) {
            case 1: case 14: pairs = [[eLeft(), eTop()]]; break;
            case 2: case 13: pairs = [[eTop(), eRight()]]; break;
            case 3: case 12: pairs = [[eLeft(), eRight()]]; break;
            case 4: case 11: pairs = [[eRight(), eBottom()]]; break;
            case 5: pairs = [[eLeft(), eTop()], [eRight(), eBottom()]]; break;
            case 6: case 9: pairs = [[eTop(), eBottom()]]; break;
            case 7: case 8: pairs = [[eLeft(), eBottom()]]; break;
            case 10: pairs = [[eTop(), eRight()], [eLeft(), eBottom()]]; break;
            default: pairs = [];
          }
          for (const [a, b] of pairs) segs.push(a[0], a[1], b[0], b[1]);
        }
      }
      const EPS = 0.5;
      const segments = [];
      for (let i = 0; i < segs.length; i += 4) {
        segments.push({ a: [segs[i], segs[i + 1]], b: [segs[i + 2], segs[i + 3]], used: false });
      }
      const paths = [];
      for (const s of segments) {
        if (s.used) continue;
        s.used = true;
        const chain = [s.a, s.b];
        let changed = true;
        while (changed) {
          changed = false;
          const tail = chain[chain.length - 1];
          for (const t of segments) {
            if (t.used) continue;
            if (Math.abs(t.a[0] - tail[0]) < EPS && Math.abs(t.a[1] - tail[1]) < EPS) { chain.push(t.b); t.used = true; changed = true; break; }
            if (Math.abs(t.b[0] - tail[0]) < EPS && Math.abs(t.b[1] - tail[1]) < EPS) { chain.push(t.a); t.used = true; changed = true; break; }
          }
        }
        changed = true;
        while (changed) {
          changed = false;
          const head = chain[0];
          for (const t of segments) {
            if (t.used) continue;
            if (Math.abs(t.a[0] - head[0]) < EPS && Math.abs(t.a[1] - head[1]) < EPS) { chain.unshift(t.b); t.used = true; changed = true; break; }
            if (Math.abs(t.b[0] - head[0]) < EPS && Math.abs(t.b[1] - head[1]) < EPS) { chain.unshift(t.a); t.used = true; changed = true; break; }
          }
        }
        if (chain.length > 3) paths.push(chain);
      }
      const d = paths.map((pts) =>
        pts.map((p, i) => i === 0 ? `M ${p[0].toFixed(1)} ${p[1].toFixed(1)}` : `L ${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(" ")
      ).join(" ");
      return { d, idx, iso, isIndex: idx % 5 === 0 };
    });
    const summits = peaksDef.filter((p) => p.h > 1.5).map((p) => ({ x: p.x, y: p.y }));
    return { lines, peaks: summits };
  }, []);

  return (
    <div style={{ position: "absolute", inset: 0, overflow: "hidden" }}>
      <div style={{ position: "absolute", inset: 0,
        backgroundImage: `linear-gradient(${weak} 1px, transparent 1px), linear-gradient(90deg, ${weak} 1px, transparent 1px)`,
        backgroundSize: "48px 48px" }} />
      <svg viewBox="0 0 1080 1080" style={{ position: "absolute", inset: 0, width: "100%", height: "100%" }} preserveAspectRatio="none">
        <g fill="none" stroke={stroke} strokeLinecap="round" strokeLinejoin="round">
          {lines.map((ln) => (
            <path key={ln.idx} d={ln.d} strokeWidth={ln.isIndex ? 1.4 : 0.8} opacity={ln.isIndex ? 0.9 : 0.55} />
          ))}
        </g>
        <g stroke={accent} strokeWidth={1.2}>
          {peaks.map((p, i) => (
            <React.Fragment key={i}>
              <line x1={p.x - 7} y1={p.y} x2={p.x + 7} y2={p.y} />
              <line x1={p.x} y1={p.y - 7} x2={p.x} y2={p.y + 7} />
            </React.Fragment>
          ))}
        </g>
      </svg>
      {children}
    </div>
  );
}

function CornerTick({ x, y, size = 28, color = C.negro, weight = 1.5 }) {
  return (
    <svg width={size} height={size} style={{ position: "absolute", left: x, top: y }}>
      <line x1={0} y1={size / 2} x2={size} y2={size / 2} stroke={color} strokeWidth={weight} />
      <line x1={size / 2} y1={0} x2={size / 2} y2={size} stroke={color} strokeWidth={weight} />
    </svg>
  );
}

function Eyebrow({ children, color = C.naranja, style }) {
  return (
    <div style={{
      fontFamily: "Montserrat, sans-serif",
      fontWeight: 800, fontSize: 14, letterSpacing: "0.14em",
      textTransform: "uppercase", color, ...style
    }}>{children}</div>
  );
}

function Frame({ bg = C.crema, children, style }) {
  return (
    <div style={{
      width: 1080, height: 1080, background: bg,
      position: "relative", overflow: "hidden",
      fontFamily: "Montserrat, sans-serif", color: C.negro, ...style
    }}>{children}</div>
  );
}

function V3_Pill({ t }) {
  const IconExtractor = () => (

}
