<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Transfer Icon — BIM Pills</title>
<style>
  body { font-family: 'Segoe UI', sans-serif; background: #f0f0f0; padding: 32px; }
  h2 { color: #333; margin-bottom: 4px; }
  .row { display: flex; gap: 32px; flex-wrap: wrap; align-items: flex-start; margin-bottom: 32px; }
  .card { background: white; border-radius: 10px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,.08); text-align: center; }
  .label { font-size: 12px; color: #86868B; margin-top: 10px; }
  .bg-dark { background: #1C1C1E; }
  .bg-dark .label { color: #8E8E93; }
</style>
</head>
<body>
<h2>BIM Pills — Icono "Trasladar"</h2>
<p style="color:#86868B;margin-bottom:24px">Caja redondeada abierta + flecha naranja saliendo.</p>

<div class="row">
  <!-- 2× zoom -->
  <div class="card">
    <svg width="64" height="64" viewBox="0 0 32 32">
      <!-- Open-top rounded box: x=5..27 y=11..28 r=4, gap x=13..19 -->
      <path d="M19,11 L23,11 A4,4 0 0,1 27,15 L27,24 A4,4 0 0,1 23,28 L9,28 A4,4 0 0,1 5,24 L5,15 A4,4 0 0,1 9,11 L13,11"
            fill="white" stroke="#212B37" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Arrow up — orange -->
      <line x1="16" y1="3" x2="16" y2="22" stroke="#EF6337" stroke-width="2.2" stroke-linecap="round"/>
      <polyline points="11,8 16,3 21,8" fill="none" stroke="#EF6337" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="label">2× zoom</div>
  </div>

  <!-- Tamaño real 32px -->
  <div class="card">
    <svg width="32" height="32" viewBox="0 0 32 32">
      <path d="M19,11 L23,11 A4,4 0 0,1 27,15 L27,24 A4,4 0 0,1 23,28 L9,28 A4,4 0 0,1 5,24 L5,15 A4,4 0 0,1 9,11 L13,11"
            fill="white" stroke="#212B37" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="16" y1="3" x2="16" y2="22" stroke="#EF6337" stroke-width="2.2" stroke-linecap="round"/>
      <polyline points="11,8 16,3 21,8" fill="none" stroke="#EF6337" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="label">32px real</div>
  </div>

  <!-- Simulación ribbon Revit (fondo gris claro) -->
  <div class="card" style="background:#F0F0F0">
    <svg width="64" height="64" viewBox="0 0 32 32">
      <path d="M19,11 L23,11 A4,4 0 0,1 27,15 L27,24 A4,4 0 0,1 23,28 L9,28 A4,4 0 0,1 5,24 L5,15 A4,4 0 0,1 9,11 L13,11"
            fill="white" stroke="#212B37" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="16" y1="3" x2="16" y2="22" stroke="#EF6337" stroke-width="2.2" stroke-linecap="round"/>
      <polyline points="11,8 16,3 21,8" fill="none" stroke="#EF6337" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="label">Fondo ribbon</div>
  </div>

  <!-- Dark theme -->
  <div class="card bg-dark">
    <svg width="64" height="64" viewBox="0 0 32 32">
      <path d="M19,11 L23,11 A4,4 0 0,1 27,15 L27,24 A4,4 0 0,1 23,28 L9,28 A4,4 0 0,1 5,24 L5,15 A4,4 0 0,1 9,11 L13,11"
            fill="#2C2C2E" stroke="#E8E8EA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="16" y1="3" x2="16" y2="22" stroke="#EF6337" stroke-width="2.2" stroke-linecap="round"/>
      <polyline points="11,8 16,3 21,8" fill="none" stroke="#EF6337" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="label">Dark mode</div>
  </div>
</div>

</body>
</html>
